version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rfqbot_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-kalshi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kalshibot123}
      POSTGRES_DB: ${DB_NAME:-rfqbot}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - rfqbot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: rfqbot_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kalshi.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: rfqbot_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - rfqbot_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rfqbot_pgdata:
  rfqbot_redisdata:
